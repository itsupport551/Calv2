# Railway uses the multi-stage Dockerfile in this directory.
# The Dockerfile's CMD runs `prisma migrate deploy` before starting
# the server, so the database schema is always up to date on boot.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
# 300s window: gives the container time to install Prisma engines, run
# migrations (bounded to 25s in the Dockerfile CMD), and start node
# without the deploy being killed prematurely. The Dockerfile CMD
# guarantees node starts even if migrations time out.
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production]
variables = { NODE_ENV = "production", PORT = "4400" }
